[common]
# UI language. Use Auto for system language, en_US for English, zh_CN for Simplified Chinese.
Language=en_US

# Main window title.
WindowTitle=MPhone

# Remote directory used when pushing files to Android devices. Must end with "/".
PushFilePath=/sdcard/

# Maximum capture FPS. Use 0 for the device/server default.
MaxFps=0

# Render expired video frames. Set 0 for lower latency, 1 for smoother catch-up playback.
RenderExpiredFrames=0

# Desktop OpenGL mode: -1 auto, 0 software, 1 OpenGLES, 2 desktop OpenGL.
UseDesktopOpenGL=-1

# Remote path for the pushed scrcpy server jar on Android devices.
ServerPath=/data/local/tmp/scrcpy-server.jar

# Optional custom ADB executable path.
AdbPath=

# Android MediaFormat codec options. Empty string means default.
# Example: CodecOptions="profile=1,level=2"
CodecOptions=""

# Specific H.264 encoder name. Empty string means default.
# Example: CodecName="OMX.qcom.video.encoder.avc"
CodecName=""

# Log level: verbose, debug, info, warn, error.
LogLevel=verbose
