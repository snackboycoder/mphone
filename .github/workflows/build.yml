name: Build MPhone

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: macOS arm64 dmg
    runs-on: macos-14
    env:
      ENV_QT_PATH: ${{ github.workspace }}/Qt/6.5.3
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          dir: ${{ github.workspace }}/Qt
          modules: qtmultimedia
          cached: true
      - name: Build
        shell: bash
        run: |
          ci/mac/build_for_mac.sh RelWithDebInfo arm64
      - name: Deploy app
        shell: bash
        run: |
          ci/mac/publish_for_mac.sh ../build arm64
      - name: Build DMG
        shell: bash
        run: |
          mkdir -p artifacts
          hdiutil create \
            -volname MPhone \
            -srcfolder ci/build/MPhone.app \
            -ov \
            -format UDZO \
            artifacts/MPhone-macos-arm64.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: MPhone-macos-arm64
          path: artifacts/MPhone-macos-arm64.dmg

  linux:
    name: Linux amd64 deb
    runs-on: ubuntu-22.04
    env:
      DEBIAN_FRONTEND: noninteractive
      QT_DESIRED_VERSION: "6"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build dpkg-dev patchelf \
            qt6-base-dev qt6-base-private-dev qt6-multimedia-dev qt6-tools-dev \
            libqt6opengl6-dev libgl1 libgl1-mesa-dev libx11-dev libxcb1-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libdbus-1-3 libudev1
      - name: Build and package deb
        shell: bash
        run: |
          ci/linux/package_deb.sh Release
          mkdir -p artifacts
          cp output/deb/*.deb artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: MPhone-linux-amd64-deb
          path: artifacts/*.deb

  windows:
    name: Windows x64
    runs-on: windows-2022
    env:
      ENV_QT_PATH: ${{ github.workspace }}\Qt\6.5.3
      ENV_VCVARSALL: C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat
      ENV_VCINSTALL: C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          dir: ${{ github.workspace }}\Qt
          arch: win64_msvc2019_64
          modules: qtmultimedia
          cached: true
      - name: Build
        shell: cmd
        run: |
          call ci\win\build_for_win.bat RelWithDebInfo x64
      - name: Package
        shell: powershell
        run: |
          cmd.exe /c ci\win\publish_for_win.bat x64 ..\build\MPhone-windows-x64
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Compress-Archive -Path ci\build\MPhone-windows-x64 -DestinationPath artifacts\MPhone-windows-x64.zip -Force
      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup --no-progress -y
      - name: Build installer
        shell: powershell
        run: |
          $env:MPHONE_PACKAGE_DIR = "$env:GITHUB_WORKSPACE\ci\build\MPhone-windows-x64"
          $env:MPHONE_INSTALLER_OUTPUT = "$env:GITHUB_WORKSPACE\artifacts"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "$env:GITHUB_WORKSPACE\ci\win\installer\MPhone.iss"
      - uses: actions/upload-artifact@v4
        with:
          name: MPhone-windows-x64
          path: |
            artifacts/MPhone-windows-x64.zip
            artifacts/MPhoneSetup-x64.exe

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - macos
      - linux
      - windows
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: List release assets
        shell: bash
        run: |
          find release-assets -type f -maxdepth 3 -print
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: MPhone ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/MPhone-windows-x64/MPhoneSetup-x64.exe
            release-assets/MPhone-windows-x64/MPhone-windows-x64.zip
            release-assets/MPhone-linux-amd64-deb/*.deb
            release-assets/MPhone-macos-arm64/MPhone-macos-arm64.dmg
